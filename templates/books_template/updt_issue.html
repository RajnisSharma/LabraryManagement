{% extends 'navbar/base.html' %}
{% load static %}

{% block content %}
  <div class="page-wrapper">
    <div class="container py-5">
      <div class="d-flex align-items-center justify-content-center min-vh-10">
        <div class="col-md-6">

          <div class="card">
            <div class="card-header">
              <h3>Update Issued Book</h3>
            </div>
            <div class="card-body">

              {% if messages %}
                {% for msg in messages %}
                  <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}

              <form method="post" novalidate class="needs-validation">
                {% csrf_token %}

                <div class="mb-3">
                  <label class="form-label">Student</label>
                  <input type="text" class="form-control-plaintext" value="{{ Stud.stud_name }}" readonly>
                </div>

                <div class="mb-3">
                  <label for="id_book" class="form-label">Book Name<span class="text-danger">*</span></label>
                  <select id="id_book" name="ddlBookName" class="form-select" required>
                    <option value="{{ Issue.book_name.book_name }}" selected>{{ Issue.book_name.book_name }}</option>
                    {% for b in Book %}
                      <option value="{{ b.book_name }}">{{ b.book_name }}</option>
                    {% endfor %}
                  </select>
                  <div class="invalid-feedback">Please choose a book.</div>
                </div>

                <div class="mb-3">
                  <label for="id_start" class="form-label">Start Date<span class="text-danger">*</span></label>
                  <input type="date" id="id_start" name="txtStartDate" class="form-control" value="{{ Issue.start_date }}" required>
                  <div class="invalid-feedback">Please choose a start date.</div>
                </div>

                <div class="mb-3">
                  <label for="id_end" class="form-label">End Date<span class="text-danger">*</span></label>
                  <input type="date" id="id_end" name="txtEndDate" class="form-control" value="{{ Issue.end_date }}" required>
                  <div class="invalid-feedback">Please choose an end date.</div>
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary">Update</button>
                </div>
              </form>

            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
{% endblock %}
