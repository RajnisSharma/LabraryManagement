{% load static %}

<nav class="navbar navbar-expand-lg navbar-dark bg-transparent py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'studhome' %}">
      <i class="fas fa-book fa-lg text-secondary"></i>
      <span class="fw-bold">Student Portal</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#studentNav" aria-controls="studentNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="studentNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 align-items-lg-center">
        <li class="nav-item"><a class="nav-link" href="{% url 'studhome' %}"><i class="fas fa-home me-1"></i> Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'search_books' %}"><i class="fas fa-search me-1"></i> Search</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'stud_books' %}"><i class="fas fa-book-reader me-1"></i> My Books</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'getprof' %}"><i class="fas fa-user me-1"></i> Profile</a></li>
      </ul>

      <ul class="navbar-nav align-items-center">
        <li class="nav-item"><a class="nav-link btn btn-sm btn-outline-danger ms-2" href="{% url 'log_out' %}"><i class="fas fa-sign-out-alt me-1"></i> Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const links = document.querySelectorAll('.navbar .nav-link');
    links.forEach(l => {
      if (l.href === window.location.href || window.location.pathname && l.getAttribute('href') && window.location.pathname.startsWith(new URL(l.href, window.location.origin).pathname)) {
        l.classList.add('active');
      }
      l.addEventListener('click', () => {
        links.forEach(x => x.classList.remove('active'));
        l.classList.add('active');
      });
    });
  });
</script>
