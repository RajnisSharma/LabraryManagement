{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Library Management System - Student Portal (No Nav)" />
  <title>Library Management System</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Font Awesome Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-iecdLmaskl7CVJkEZSMUkrQ6usKu8zQwAaSH/0vYlLccQsDlqWQccN/v5m36xJtJ0ecyNvjyv5Z5uXY6blJaQw=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <link rel="stylesheet" href="{% static 'css/mobile.css' %}" />
  <link rel="stylesheet" href="{% static 'css/tablet.css' %}" media="(min-width: 768px)" />
  <link rel="stylesheet" href="{% static 'css/desktop.css' %}" media="(min-width: 992px)" />
  <link rel="stylesheet" href="{% static 'css/global.css' %}" />

  {% block extra_css %} {% endblock %}

  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }
    .content-wrapper { flex:1; padding:0; }
  </style>
</head>
<body>

  <div class="content-wrapper">
    {% block content %} {% endblock %}
  </div>

  <div class="footer-wrapper">
    {% include "navbar/footer.html" %}
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9QrcJ9kK4A8bsO6awYAB"
    crossorigin="anonymous"
  ></script>

  <script src="{% static 'js/bootstrap_fallback.js' %}"></script>

  {% block extra_js %} {% endblock %}
</body>
</html>
